services:
  db:
    image: postgres:15
    container_name: coretrack-db
    restart: always
    environment:
      POSTGRES_USER: coretrack
      POSTGRES_PASSWORD: coretrack123
      POSTGRES_DB: coretrack
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coretrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: coretrack-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@coretrack.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
