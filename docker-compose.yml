version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: living-legacy-db
    environment:
      POSTGRES_USER: livinglegacy
      POSTGRES_PASSWORD: livinglegacy
      POSTGRES_DB: livinglegacy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U livinglegacy']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
